# Example multi-agent feature pipeline.
# Replace cwd with your repo, swap mock → claude/cursor/codex/gemini for real agents.
name: add-checkout-flow
cwd: .
max_parallel: 2
defaults:
  on_failure: retry
  max_retries: 1

agents:
  ui:
    provider: mock
    model: sonnet
  api:
    provider: mock
    model: composer-2.5
  qa:
    provider: mock
    model: sonnet
  fixer:
    provider: mock
    model: opus

tasks:
  - id: implement-ui
    agent: ui
    prompt: |
      Implement the checkout UI in src/components/Checkout.
      Working directory: {{cwd}}
      Workflow: {{workflow.name}}

  - id: implement-api
    agent: api
    prompt: |
      Implement POST /api/checkout and wire it to the UI contracts.
      Working directory: {{cwd}}

  - id: write-tests
    agent: qa
    depends_on: [implement-ui, implement-api]
    prompt: |
      Write integration tests for the checkout flow.
      Upstream summary:
      {{upstream.summary}}

  - id: fix-failures
    agent: fixer
    depends_on: [write-tests]
    when: on_upstream_failure
    prompt: |
      Fix failing tests from the QA run.
      Context:
      {{upstream.summary}}
      QA output:
      {{task.write-tests.output}}
