# Same pipeline using real CLIs. Requires tools installed and authenticated.
#   Claude Code: `claude` on PATH
#   Cursor: `agent` / `cursor-agent` on PATH + `agent login` (no API key)
name: add-checkout-flow-real
cwd: .
max_parallel: 2
defaults:
  on_failure: retry
  max_retries: 1

agents:
  ui:
    provider: claude
    model: sonnet
  api:
    provider: cursor
    model: composer-2.5
  qa:
    provider: claude
    model: sonnet
  fixer:
    provider: claude
    model: opus

tasks:
  - id: implement-ui
    agent: ui
    prompt: |
      Implement the checkout UI. Keep changes minimal and focused.

  - id: implement-api
    agent: api
    prompt: |
      Implement the checkout API endpoint matching the UI contracts.

  - id: write-tests
    agent: qa
    depends_on: [implement-ui, implement-api]
    prompt: |
      Add tests for checkout. Run them and report results.
      Upstream:
      {{upstream.summary}}

  - id: fix-failures
    agent: fixer
    depends_on: [write-tests]
    when: on_upstream_failure
    prompt: |
      Fix the failures from QA:
      {{upstream.summary}}
